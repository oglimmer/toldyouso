replicaCount: 1

image:
  repository: registry.oglimmer.com/toldyouso
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1500Mi
  requests:
    cpu: 150m
    memory: 768Mi

javaOpts: "-Xmx1024m -Xms512m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC"

# Application properties (mounted as /tmp/toldyouso.properties)
appConfig:
  toldyouso.domain: "https://toldyouso.oglimmer.com"
  couchdb.host: "couchdb-prod-svc-couchdb.couchdb.svc.cluster.local"
  couchdb.user: "toldyouso-app"
  couchdb.password: ""
  smtp.host: "192.168.178.52"
  smtp.port: "25"
  smtp.from: "\"toldyouso robot\" <robot@junta-online.net>"

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
  hosts:
    - host: toldyouso.oglimmer.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tls-toldyouso-ingress-dns
      hosts:
        - toldyouso.oglimmer.com

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets:
  - name: oglimmerregistrykey
