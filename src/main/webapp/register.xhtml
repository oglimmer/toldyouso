<ui:composition template="/WEB-INF/html/base.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:pt="jakarta.faces.passthrough">

    <ui:define name="content">
    	<h:form>
			<div class="register-card">
				<h2>Create Account</h2>
				<p>
					To delete your account or associated data, email &#111;&#103;&#108;&#105;&#109;&#109;&#101;&#114;&#064;&#103;&#109;&#097;&#105;&#108;&#046;&#099;&#111;&#109;
				</p>

				<h:panelGroup rendered="#{not empty register.message}">
					<div class="alert alert-success alert-dismissible fade show mb-3" role="alert">
						<h:outputText value="#{register.message}" escape="false" />
						<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
					</div>
				</h:panelGroup>

				<div class="mb-3">
					<h:inputText id="email" pt:placeholder="Your email" styleClass="form-control" value="#{register.user.email}" required="true">
						<f:validateRegex pattern="^[_A-Za-z0-9-\+]+(\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9]+)*(\.[A-Za-z]{2,})$" />
						<f:validator binding="#{emailValidator}"/>
					</h:inputText>
					<h:message for="email" styleClass="form-text text-danger" />
				</div>
				<div class="mb-3">
					<h:inputSecret id="password" pt:placeholder="Password" styleClass="form-control" value="#{register.user.loginPassword}" required="true">
						<f:validateLength maximum="255" minimum="3"/>
						<f:validator validatorId="passwordValidator" />
						<f:attribute name="confirmPassword" value="#{confirmPassword}" />
					</h:inputSecret>
					<h:message for="password" styleClass="form-text text-danger" />
				</div>
				<div class="mb-3">
					<h:inputSecret id="password2" pt:placeholder="Confirm password" styleClass="form-control" binding="#{confirmPassword}" required="true">
						<f:validateLength maximum="255" minimum="3"/>
					</h:inputSecret>
					<h:message for="password2" styleClass="form-text text-danger" />
				</div>
				<div class="btn-group-register">
					<h:link outcome="index" styleClass="btn btn-outline-secondary">Cancel</h:link>
					<h:commandLink action="#{register.save()}" styleClass="btn btn-primary">
						Create Account <i class="bi bi-check-lg ms-1"></i>
					</h:commandLink>
				</div>
			</div>
		</h:form>
    </ui:define>
</ui:composition>
