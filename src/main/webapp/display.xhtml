<ui:composition template="/WEB-INF/html/base.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<f:metadata>
		<f:viewParam name="id" value="#{getEntryPortal.id}" />
		<f:viewAction action="#{getEntryPortal.load}"/>
	</f:metadata>

    <ui:define name="content">
		<div class="evidence-card">
			<div class="evidence-fact">
				<h:outputText value="#{getEntryPortal.smartAssEntry.fact}" />
			</div>
			<div class="evidence-meta">
				<span class="date-badge">
					Created <h:outputText value="#{getEntryPortal.smartAssEntry.creationDate}" />
				</span>
				<h:panelGroup rendered="#{not empty getEntryPortal.smartAssEntry.email}">
					<span class="author-badge">
						by <h:outputText value="#{getEntryPortal.smartAssEntry.email}" />
					</span>
				</h:panelGroup>
			</div>
			<div class="evidence-actions">
				<h:form rendered="#{getEntryPortal.smartAssEntry.encrypted}">
					<h:inputHidden value="#{getEntryPortal.id}" />
					<span style="font-size:13px;color:var(--text-dim);letter-spacing:0.03em;text-transform:uppercase;">This entry is encrypted.</span>
					<h:outputText value=" Only visible to you while logged in." rendered="#{loginData.user.id == getEntryPortal.smartAssEntry.creatorId}"
						style="color:var(--text-faint);font-size:13px;" />
					<h:commandLink styleClass="btn btn-warning btn-sm ms-2" action="#{getEntryPortal.decryptFact}" rendered="#{getEntryPortal.showbutton}">
						Decrypt
					</h:commandLink>
				</h:form>
				<h:form rendered="#{not getEntryPortal.smartAssEntry.encrypted}">
					<h:inputHidden value="#{getEntryPortal.id}" />
					<h:commandLink styleClass="btn btn-warning btn-sm" action="#{getEntryPortal.cryptFact}" rendered="#{getEntryPortal.showbutton}">
						Encrypt
					</h:commandLink>
				</h:form>
			</div>
		</div>
    </ui:define>
</ui:composition>
