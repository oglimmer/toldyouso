<ui:composition template="/WEB-INF/html/base.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:pt="jakarta.faces.passthrough">

    <ui:define name="content">
        <h:panelGroup rendered="#{not empty saveEntryPortal.message}">
            <div class="alert alert-success alert-dismissible fade show mb-3" role="alert">
                <h:outputText value="#{saveEntryPortal.message}" escape="false" />
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </h:panelGroup>
		<div class="card-modern">
			<h2>Create Evidence</h2>
			<h:form>
				<div class="mb-3">
					<h:inputTextarea id="fact" styleClass="form-control" value="#{saveEntryPortal.smartAssEntry.fact}" required="true"
						pt:placeholder="Describe here what you already know, but someone else doesn't believe yet...">
						<f:validateLength maximum="10000" minimum="5"/>
					</h:inputTextarea>
					<h:message for="fact" styleClass="form-text text-danger" />
				</div>
				<h:panelGroup rendered="#{not loginData.loggedIn}">
					<div class="mb-3">
						<h:inputText id="email" pt:placeholder="Your email (optional)" styleClass="form-control" value="#{saveEntryPortal.smartAssEntry.email}">
							<f:validateRegex pattern="^[_A-Za-z0-9-\+]+(\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9]+)*(\.[A-Za-z]{2,})$" />
						</h:inputText>
						<h:message for="email" styleClass="form-text text-danger" />
					</div>
				</h:panelGroup>
				<h:panelGroup rendered="#{loginData.loggedIn}" layout="block" styleClass="form-check mb-3">
					<h:selectBooleanCheckbox id="crypted" value="#{saveEntryPortal.crypted}" styleClass="form-check-input" />
					<h:outputLabel for="crypted" styleClass="form-check-label" value="Encrypt text (if you don't trust the administrators of this host)" />
				</h:panelGroup>
				<div class="mt-4">
					<h:commandLink action="#{saveEntryPortal.save()}" styleClass="btn btn-primary">
						Save Evidence
					</h:commandLink>
				</div>
			</h:form>
		</div>
    </ui:define>
</ui:composition>
